---
# Rol common: preparación general del sistema para k3s

# Actualizar la caché de paquetes apt
- name: Actualizar caché de paquetes apt
  apt:
    update_cache: true
    cache_valid_time: 3600
  register: resultado_apt
  retries: 3
  delay: 10
  until: resultado_apt is succeeded

# Instalar paquetes necesarios para k3s y la configuración del sistema
- name: Instalar paquetes requeridos
  apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - ca-certificates
      - software-properties-common
    state: present

# Deshabilitar swap (requerido por kubernetes)
- name: Deshabilitar swap
  command: swapoff -a
  changed_when: false

# Eliminar entrada de swap en fstab para que no se active al reiniciar
- name: Deshabilitar swap en fstab
  lineinfile:
    path: /etc/fstab
    regexp: '\bswap\b'
    state: absent

# Cargar módulos del kernel necesarios para k3s
- name: Cargar módulos del kernel para k3s
  copy:
    content: |
      overlay
      br_netfilter
    dest: /etc/modules-load.d/k3s.conf
    mode: '0644'

# Cargar módulo overlay para el sistema de archivos de contenedores
- name: Cargar módulo overlay
  modprobe:
    name: overlay
    state: present

# Cargar módulo br_netfilter para el filtrado de red
- name: Cargar módulo br_netfilter
  modprobe:
    name: br_netfilter
    state: present

# Configurar parámetros sysctl requeridos por kubernetes
- name: Configurar parámetros sysctl para kubernetes
  copy:
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    dest: /etc/sysctl.d/99-kubernetes.conf
    mode: '0644'

# Aplicar los parámetros sysctl configurados
- name: Aplicar parámetros sysctl
  command: sysctl --system
  changed_when: false
