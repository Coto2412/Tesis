---
# Rol keepalived: configuración de alta disponibilidad con IP virtual

# Instalar el paquete keepalived
- name: Instalar keepalived
  apt:
    name: keepalived
    state: present

# Desplegar la configuración de keepalived desde la plantilla
- name: Configurar keepalived
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    mode: '0644'
  notify: Reiniciar keepalived

# Habilitar e iniciar el servicio keepalived
- name: Habilitar servicio keepalived
  systemd:
    name: keepalived
    enabled: true
    state: started
