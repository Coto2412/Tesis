#cloud-config
# Configuración de cloud-init para cada máquina virtual
hostname: ${hostname}
fqdn: ${hostname}.k3s-tesis.local

# Configuración del usuario del clúster con acceso sudo sin contraseña
users:
  - name: ${cluster_user}
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}

# Deshabilitar acceso por contraseña SSH
ssh_pwauth: false



# Actualizar paquetes al iniciar
package_update: true
package_upgrade: true

# Paquetes adicionales a instalar
packages:
  - qemu-guest-agent

# Comandos a ejecutar después de la configuración inicial
runcmd:
  # Habilitar e iniciar el agente invitado de QEMU
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  # Forzar aplicación de netplan y activación de la interfaz
  - netplan generate
  - netplan apply
  - ip link set ens3 up

# Mensaje final de cloud-init
final_message: "Cloud init finalizó en $UPTIME segundos"
