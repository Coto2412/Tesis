# Configuración de red para cloud-init (netplan)
version: 2
ethernets:
  ens3:
    match:
      macaddress: "${mac_address}"
    set-name: "ens3"
    dhcp4: false
    dhcp6: false
    addresses:
      - ${ip_address}/24
    # Puerta de enlace predeterminada de la red k3s-tesis
    gateway4: 192.168.100.1
    optional: true
    nameservers:
      # Servidores DNS de Google
      addresses:
        - 8.8.8.8
        - 8.8.4.4
